<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Vignette Mission cybersécurité">
    <defs>
        <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0F1F35"/>
            <stop offset="1" stop-color="#0A1628"/>
        </linearGradient>
        <linearGradient id="acc4" x1="1" y1="0" x2="0.3" y2="1">
            <stop offset="0" stop-color="#3B82F6" stop-opacity="0.55"/>
            <stop offset="1" stop-color="#1E40AF" stop-opacity="0"/>
        </linearGradient>
        <pattern id="grid4" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#3B82F6" stroke-width="0.4" stroke-opacity="0.1"/>
        </pattern>
        <style>
            .t4 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
            .s4 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: 0.2em; }
        </style>
    </defs>
    <rect width="400" height="250" fill="url(#bg4)"/>
    <rect width="400" height="250" fill="url(#grid4)"/>
    <rect width="400" height="250" fill="url(#acc4)"/>
    <rect x="0" y="0" width="3" height="60" fill="#3B82F6"/>
    <text x="28" y="130" class="t4" fill="#F5F7FA" font-size="28">Acteur</text>
    <text x="28" y="162" class="t4" fill="#F5F7FA" font-size="28">cybersécurité</text>
    <text x="28" y="210" class="s4" fill="#94A3B8" font-size="10">MISSION SOUS NDA · 2025</text>
</svg>
