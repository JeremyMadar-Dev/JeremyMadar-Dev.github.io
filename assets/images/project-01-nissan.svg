<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Vignette Nissan Financial Services">
    <defs>
        <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0F1F35"/>
            <stop offset="1" stop-color="#0A1628"/>
        </linearGradient>
        <linearGradient id="acc1" x1="1" y1="0" x2="0.3" y2="1">
            <stop offset="0" stop-color="#C3002F" stop-opacity="0.55"/>
            <stop offset="1" stop-color="#8B0000" stop-opacity="0"/>
        </linearGradient>
        <pattern id="grid1" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#3B82F6" stroke-width="0.4" stroke-opacity="0.08"/>
        </pattern>
        <style>
            .t1 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
            .s1 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: 0.2em; }
        </style>
    </defs>
    <rect width="400" height="250" fill="url(#bg1)"/>
    <rect width="400" height="250" fill="url(#grid1)"/>
    <rect width="400" height="250" fill="url(#acc1)"/>
    <rect x="0" y="0" width="3" height="60" fill="#C3002F"/>
    <text x="28" y="130" class="t1" fill="#F5F7FA" font-size="28">Nissan</text>
    <text x="28" y="162" class="t1" fill="#F5F7FA" font-size="28">Financial Services</text>
    <text x="28" y="210" class="s1" fill="#94A3B8" font-size="10">FINANCE AUTOMOBILE · 2024</text>
</svg>
